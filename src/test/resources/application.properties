# Test Configuration using H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never
spring.flyway.enabled=false

# JWT configuration for tests
jwt.secret=8c7f3a2b91de5f87c2b4d90ea6f7813d8ab95ef34a6719c5fd2b81ea45cf7902
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=2592000000

# Frontend URL for tests
app.frontend-url=http://localhost:3000
app.frontend.url=http://localhost:3000

# Redis - point to localhost for unit tests (mocked via @MockBean in Spring test context)
# Tests that use @WebMvcTest will mock StringRedisTemplate via @MockBean
spring.redis.host=localhost
spring.redis.port=6379

# Disable Redis auto-configuration for tests that don't use Redis
# Individual test classes override this with @MockBean when needed
spring.autoconfigure.exclude=
