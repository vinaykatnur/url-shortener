# ===================================================================
# DEVELOPMENT PROFILE
# ===================================================================

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/url_shortener}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis configuration
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Security and JWT configurations
jwt.secret=${JWT_SECRET:development-only-secret}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}

# Frontend Integration
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Logging configuration
logging.level.root=INFO
logging.level.com.example.urlshortener=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
