# ===================================================================
# PRODUCTION PROFILE
# ===================================================================

# Database configuration (Strictly externalized - Must be provided by Environment)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis configuration (Strictly externalized - Must be provided by Environment)
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}

# Security and JWT configurations (Strictly externalized - Must be provided by Environment)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}

# Frontend Integration (Strictly externalized - Must be provided by Environment)
app.frontend-url=${FRONTEND_URL}

# Logging configuration
logging.level.root=WARN
logging.level.com.example.urlshortener=INFO
logging.level.org.hibernate.SQL=ERROR
