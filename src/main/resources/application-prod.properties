# ===================================================================
# PRODUCTION PROFILE
# ===================================================================

# Database configuration (Strictly externalized - Must be provided by Environment)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# HikariCP Connection Pool Tuning (Strictly capped for 512MB RAM)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Redis configuration (Strictly externalized - Must be provided by Environment)
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.ssl.enabled=${REDIS_SSL:true}
spring.redis.timeout=3000ms

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
spring.data.redis.repositories.enabled=false

# Tomcat Server & Thread Pool Tuning (for 512MB RAM constraint)
server.port=${PORT:8080}
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.max-connections=100
server.tomcat.accept-count=50

# Security and JWT configurations (Strictly externalized - Must be provided by Environment)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:2592000000}

# Frontend Integration (Strictly externalized - Must be provided by Environment)
app.frontend-url=${FRONTEND_URL}

# Logging configuration
logging.level.root=WARN
logging.level.com.example.urlshortener=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework=WARN